name: umkm_ku
description: "Aplikasi kasir dan manajemen UMKM"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # DI
  get_it: ^7.7.0
  injectable: ^2.4.1

  # Local DB
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.0

  # Supabase
  supabase_flutter: ^2.5.6

  # Font
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.1
  flutter_secure_storage: ^9.2.2

  # Utils
  uuid: ^4.4.0
  fpdart: ^1.1.0
  pub_semver: ^2.1.4
  package_info_plus: ^8.0.2
  connectivity_plus: ^6.0.3
  intl: ^0.19.0

  # UI
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  injectable_generator: ^2.6.1
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
